# ReadWritePaths target; this adds the sibling .json file. Same carve-out as
# parse/aggregate/briefing/auction — see AGENTS landmine 17, AGENT_LEARNINGS 2026-05-29.
ReadWritePaths=/home/adnan-local/.claude.json

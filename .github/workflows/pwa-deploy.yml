name: Deploy PWA

on:
  push:
    branches: [main]
    paths:
      - 'pwa/**'
      - '.github/workflows/pwa-deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Run the v3/v4 JS actions on Node 24 (GitHub forces this 2026-06-16).
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Bump SW cache version + stamp build version into index.html
        run: |
          BUILD_VERSION=$(date -u +%Y%m%d-%H%M%S)
          sed -i "s/CACHE_NAME = 'econdelta-v[^']*'/CACHE_NAME = 'econdelta-v1-${BUILD_VERSION}'/" pwa/sw.js
          sed -i "s/__BUILD_VERSION__/${BUILD_VERSION}/g" pwa/index.html
          grep "CACHE_NAME" pwa/sw.js
          grep -c "?v=${BUILD_VERSION}" pwa/index.html | xargs -I {} echo "Stamped {} script tags with v=${BUILD_VERSION}"

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: 'pwa'
      - id: deployment
        uses: actions/deploy-pages@v4

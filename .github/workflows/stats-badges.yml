name: Stats badges

# Regenerate the README's live stat badges from current Supabase counts.
# Runs after the daily aggregate; also dispatchable manually. Publishes shields
# endpoint JSON to the orphan `badges` branch, which the README badges read.

on:
  schedule:
    - cron: '0 8 * * *'   # 08:00 UTC = 14:00 BDT, after the daily aggregate
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: stats-badges
  cancel-in-progress: false

jobs:
  badges:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate badge JSON from live Supabase counts
        run: bash scripts/gen_badges.sh badges-out

      - name: Publish to the badges branch
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          tmp="$(mktemp -d)"
          cp badges-out/*.json "$tmp/"

          if git ls-remote --exit-code --heads origin badges >/dev/null 2>&1; then
            git fetch --depth=1 origin badges
            git checkout -B badges origin/badges
          else
            git checkout --orphan badges
            git rm -rf . >/dev/null 2>&1 || true
          fi

          cp "$tmp"/*.json .
          git add -- *.json
          if git diff --cached --quiet; then
            echo "No badge changes — skipping commit."
          else
            git commit -m "chore(badges): refresh stats $(date -u +%F)"
            git push origin badges
          fi
